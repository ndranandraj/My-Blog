<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F14"/>
      <stop offset="50%" style="stop-color:#1A1A24"/>
      <stop offset="100%" style="stop-color:#0F0F14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative red glow -->
  <circle cx="200" cy="350" r="200" fill="#EF4444" opacity="0.04"/>
  <circle cx="1000" cy="280" r="180" fill="#F59E0B" opacity="0.03"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Kicker badge -->
  <rect x="80" y="120" width="180" height="28" rx="14" fill="#EF4444" opacity="0.15"/>
  <text x="170" y="139" text-anchor="middle" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2">DATA INVESTIGATION</text>

  <!-- Main title -->
  <text x="80" y="210" fill="url(#textGrad)" font-family="Georgia, 'Playfair Display', serif" font-size="46" font-weight="900" letter-spacing="-0.5">Same Name, Different Initial</text>
  <text x="80" y="265" fill="#9CA3AF" font-family="Georgia, 'Playfair Display', serif" font-size="30" font-weight="700">The Dummy Candidate Factory in TN 2026</text>

  <!-- Divider line -->
  <rect x="80" y="290" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Stat boxes -->
  <g transform="translate(80, 320)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="160" height="90" rx="10" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="80" y="42" text-anchor="middle" fill="#EF4444" font-family="Inter, sans-serif" font-size="32" font-weight="800">77</text>
    <text x="80" y="68" text-anchor="middle" fill="#666677" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="1">EXACT MATCHES</text>

    <!-- Box 2 -->
    <rect x="180" y="0" width="160" height="90" rx="10" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="260" y="42" text-anchor="middle" fill="#F59E0B" font-family="Inter, sans-serif" font-size="32" font-weight="800">100+</text>
    <text x="260" y="68" text-anchor="middle" fill="#666677" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="1">SEATS AFFECTED</text>

    <!-- Box 3 -->
    <rect x="360" y="0" width="160" height="90" rx="10" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="440" y="42" text-anchor="middle" fill="#3B82F6" font-family="Inter, sans-serif" font-size="32" font-weight="800">90%+</text>
    <text x="440" y="68" text-anchor="middle" fill="#666677" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="1">FILED AS IND</text>

    <!-- Box 4 -->
    <rect x="540" y="0" width="160" height="90" rx="10" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="620" y="42" text-anchor="middle" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="32" font-weight="800">4,000</text>
    <text x="620" y="68" text-anchor="middle" fill="#666677" font-family="Inter, sans-serif" font-size="11" font-weight="600" letter-spacing="1">CANDIDATES</text>
  </g>

  <!-- Example name pairs on right side -->
  <g transform="translate(800, 140)" opacity="0.7">
    <rect x="0" y="0" width="320" height="44" rx="8" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="16" y="27" fill="#EF4444" font-family="Inter, monospace" font-size="13" font-weight="700">C. Joseph Vijay</text>
    <text x="175" y="27" fill="#444" font-family="Inter, sans-serif" font-size="11" font-weight="800">VS</text>
    <text x="205" y="27" fill="#9CA3AF" font-family="Inter, monospace" font-size="13">Vijay. G (IND)</text>

    <rect x="0" y="52" width="320" height="44" rx="8" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="16" y="79" fill="#F97316" font-family="Inter, monospace" font-size="13" font-weight="700">S. Saravanan</text>
    <text x="175" y="79" fill="#444" font-family="Inter, sans-serif" font-size="11" font-weight="800">VS</text>
    <text x="205" y="79" fill="#9CA3AF" font-family="Inter, monospace" font-size="13">A. Saravanan (IND)</text>

    <rect x="0" y="104" width="320" height="44" rx="8" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="16" y="131" fill="#A855F7" font-family="Inter, monospace" font-size="13" font-weight="700">V. Sampathkumar</text>
    <text x="175" y="131" fill="#444" font-family="Inter, sans-serif" font-size="11" font-weight="800">VS</text>
    <text x="205" y="131" fill="#9CA3AF" font-family="Inter, monospace" font-size="13">S. Sampathkumar (IND)</text>

    <rect x="0" y="156" width="320" height="44" rx="8" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="16" y="183" fill="#2563EB" font-family="Inter, monospace" font-size="13" font-weight="700">Pitchandi.K</text>
    <text x="175" y="183" fill="#444" font-family="Inter, sans-serif" font-size="11" font-weight="800">VS</text>
    <text x="205" y="183" fill="#9CA3AF" font-family="Inter, monospace" font-size="13">Pichandi.D (IND)</text>

    <rect x="0" y="208" width="320" height="44" rx="8" fill="#1A1A24" stroke="#2A2A3A" stroke-width="1"/>
    <text x="16" y="235" fill="#F97316" font-family="Inter, monospace" font-size="13" font-weight="700">V.P. Kandasamy</text>
    <text x="175" y="235" fill="#444" font-family="Inter, sans-serif" font-size="11" font-weight="800">VS</text>
    <text x="205" y="235" fill="#9CA3AF" font-family="Inter, monospace" font-size="13">Kandasamy.R (IND)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="#0B0B10" opacity="0.7"/>
  <text x="80" y="565" fill="#9CA3AF" font-family="Inter, sans-serif" font-size="14" font-weight="500">Tamil Nadu Assembly Election 2026</text>
  <text x="80" y="590" fill="#666677" font-family="Inter, sans-serif" font-size="12">4,000 candidates analysed across 234 constituencies  |  Data: ECI Affidavit Portal</text>
  <text x="1120" y="580" text-anchor="end" fill="#666677" font-family="Inter, sans-serif" font-size="12">ndranandraj.com</text>
</svg>
