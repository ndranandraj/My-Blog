  <circle cx="155" cy="354" r="3" fill="#eab308"><animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/></circle>
  <circle cx="145" cy="389" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="389" r="3" fill="#22c55e"/>

