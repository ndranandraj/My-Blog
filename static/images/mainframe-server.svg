  <circle cx="145" cy="109" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="109" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="145" cy="144" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="144" r="3" fill="#eab308"/>
  <circle cx="145" cy="179" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="179" r="3" fill="#22c55e"/>
  <circle cx="145" cy="214" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="214" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="145" cy="249" r="3" fill="#eab308"/>
  <circle cx="155" cy="249" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.4;1" dur="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="145" cy="284" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="284" r="3" fill="#22c55e"/>
  <circle cx="145" cy="319" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.6;1" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="319" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/></circle>
