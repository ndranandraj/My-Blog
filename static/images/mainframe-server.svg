  <rect x="135" y="165" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="200" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="235" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="270" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="305" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="340" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="135" y="375" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
