  <rect x="340" y="60" width="120" height="30" rx="3" fill="#0f172a"/>
  <text x="400" y="81" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="14" font-weight="bold">MAINFRAME</text>
  <!-- Server slots center -->
  <rect x="325" y="100" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="140" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="180" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="220" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="260" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="300" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="340" width="150" height="32" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="380" width="150" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
