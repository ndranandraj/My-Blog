  <line x1="200" y1="420" x2="150" y2="500" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="300" y1="420" x2="250" y2="500" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="400" y1="420" x2="350" y2="500" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="500" y1="420" x2="450" y2="500" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="600" y1="420" x2="550" y2="500" stroke="#1e293b" stroke-width="0.5"/>
