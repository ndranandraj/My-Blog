  <circle cx="347" cy="116" r="3" fill="#3b82f6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="357" cy="116" r="3" fill="#22c55e"/>
  <circle cx="337" cy="156" r="3" fill="#3b82f6"><animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="347" cy="156" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="357" cy="156" r="3" fill="#3b82f6"/>
  <circle cx="337" cy="196" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="347" cy="196" r="3" fill="#3b82f6"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="357" cy="196" r="3" fill="#22c55e"/>
  <circle cx="337" cy="236" r="3" fill="#3b82f6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="347" cy="236" r="3" fill="#22c55e"/>
  <circle cx="357" cy="236" r="3" fill="#3b82f6"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="337" cy="276" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.4;1" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="347" cy="276" r="3" fill="#3b82f6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="357" cy="276" r="3" fill="#22c55e"/>
  <circle cx="337" cy="316" r="3" fill="#3b82f6"><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/></circle>
  <circle cx="347" cy="316" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="357" cy="316" r="3" fill="#3b82f6"/>

  <!-- Right Cabinet -->
  <rect x="520" y="80" width="160" height="340" rx="6" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Server slots right -->
  <rect x="535" y="95" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="130" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="165" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="200" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="235" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="270" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="305" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="340" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="535" y="375" width="130" height="28" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <!-- LEDs right -->
  <circle cx="545" cy="109" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="555" cy="109" r="3" fill="#22c55e"/>
  <circle cx="545" cy="144" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="555" cy="144" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="545" cy="179" r="3" fill="#eab308"><animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/></circle>
  <circle cx="555" cy="179" r="3" fill="#22c55e"/>
  <circle cx="545" cy="214" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="555" cy="214" r="3" fill="#22c55e"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="545" cy="249" r="3" fill="#22c55e"/>
  <circle cx="555" cy="249" r="3" fill="#22c55e"><animate attributeName="opacity" values="1;0.5;1" dur="1.9s" repeatCount="indefinite"/></circle>

  <!-- Connecting cables -->
  <path d="M280 200 Q295 200 295 220 Q295 240 310 240" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M280 250 Q295 250 295 270 Q295 290 310 290" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M490 200 Q505 200 505 220 Q505 240 520 240" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M490 300 Q505 300 505 320 Q505 340 520 340" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- AI/Cloud element floating above -->
  <g opacity="0.9">
    <circle cx="400" cy="30" r="8" fill="#8b5cf6" opacity="0.3"><animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="30" r="4" fill="#8b5cf6"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- "AI" text with glow -->
  <text x="690" y="180" fill="#8b5cf6" font-family="monospace" font-size="28" font-weight="bold" opacity="0.8">AI</text>
  <text x="665" y="210" fill="#64748b" font-family="monospace" font-size="11">modernize?</text>

  <!-- Data flow particles -->
  <circle cx="0" cy="200" r="2" fill="#3b82f6">
    <animate attributeName="cx" values="280;310" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="250" r="2" fill="#22c55e">
    <animate attributeName="cx" values="490;520" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom text -->
  <text x="400" y="455" text-anchor="middle" fill="#475569" font-family="monospace" font-size="11">Processing an estimated $3 trillion in daily commerce</text>
  <text x="400" y="475" text-anchor="middle" fill="#334155" font-family="monospace" font-size="10">Still here. Still running. Still waiting to be modernized.</text>
</svg>
