<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
    <line x1="1000" y1="0" x2="1000" y2="220"/>
  </g>

  <!-- Glow strip -->
  <rect width="1200" height="2" y="109" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="110" r="60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="150" cy="110" r="40" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1050" cy="110" r="60" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1050" cy="110" r="40" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

  <!-- Floating dots -->
  <circle cx="300" cy="60" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="500" cy="40" r="1.5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="700" cy="70" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="900" cy="45" r="1.5" fill="#22c55e" opacity="0.5"/>
  <circle cx="400" cy="170" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="800" cy="160" r="1.5" fill="#3b82f6" opacity="0.5"/>

  <!-- Placeholder text -->
  <text x="600" y="100" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="13">[ Add your header image here ]</text>
  <text x="600" y="125" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">Replace header-placeholder.svg in static/images/</text>
</svg>
