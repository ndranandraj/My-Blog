baseURL = "https://ndranandraj.github.io/My-Blog/"
languageCode = "en-us"
title = "Anand's Blog"
theme = "blowfish"

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  description = "Personal blog — thoughts, experiences, and more."
  author = "Anand"

  [params.homepage]
    layout = "profile"
    showRecent = true
    recentLimit = 5

[params.article]
  showDate = true
  showReadingTime = true
  showTaxonomies = true

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

[pagination]
  pagerSize = 5
