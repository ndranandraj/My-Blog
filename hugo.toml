baseURL = "https://ndranandraj.com/"
languageCode = "en-us"
title = "Anand's Blog"
theme = "stack"
paginate = 5
enableRobotsTXT = true
canonifyURLs = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  mainSections = ["posts"]
  description = "Personal blog by Anand — tech, photography, football and random thoughts."
  favicon = "images/Anand_enhanced.jpg"
  defaultColorScheme = "dark"

  [params.dateFormat]
    published = "January 2, 2006"
    lastUpdated = "January 2, 2006"

  [params.author]
    name = "Anand"
    bio = "Tech, photography, football and random thoughts."

  [params.sidebar]
    emoji = "📝"
    subtitle = "Tech, photography, football and random thoughts."
    avatar = "img/Anand_enhanced.jpg"

  [params.footer]
    since = 2026

  [params.article]
    math = false
    readingTime = true

  [params.comments]
    enabled = false

