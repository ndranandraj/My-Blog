baseURL = "https://ndranandraj.com/"
languageCode = "en-us"
title = "Anand's Blog"
theme = "PaperMod"
enableRobotsTXT = true
canonifyURLs = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60

[params]
  env = "production"
  author = "Anand Raj"
  description = "Personal blog by Anand — tech, travel, photography, and random thoughts."
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  mainSections = ["posts"]

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  ShowRelatedContent = true
  UseHugoToc = true
  disableScrollToTop = false
  ShowToc = true
  TocOpen = false

  [params.assets]
    favicon = "/images/Anand_enhanced.jpg"
    favicon16x16 = "/images/Anand_enhanced.jpg"
    favicon32x32 = "/images/Anand_enhanced.jpg"
    apple_touch_icon = "/images/Anand_enhanced.jpg"

  [params.label]
    text = "Anand's Blog"

  [params.profileMode]
    enabled = true
    title = "Hi, I'm Anand"
    subtitle = "Mainframe engineer by day. Photographer, football fan, and occasional builder of random things. I write about tech, travel, and everything in between."
    imageUrl = "/images/Anand_enhanced.jpg"
    imageTitle = "Anand"
    imageWidth = 160
    imageHeight = 160
    [[params.profileMode.buttons]]
      name = "Read the Blog"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "About Me"
      url = "/page/about/"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/anandraj-r-78b86198"
  [[params.socialIcons]]
    name = "instagram"
    url = "https://www.instagram.com/ndranandraj"
  [[params.socialIcons]]
    name = "goodreads"
    url = "https://www.goodreads.com/user/show/16492967-anandraj-r"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true
    responsiveImages = true

[services.googleAnalytics]
  ID = "G-WG6FZGEPT7"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/page/about/"
    weight = 2
  [[menu.main]]
    name = "Archive"
    url = "/archives/"
    weight = 3
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 4
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 5

[pagination]
  pagerSize = 10
