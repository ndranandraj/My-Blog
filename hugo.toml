baseURL = "https://yourdomain.com/"
languageCode = "en-us"
title = "Anand's Blog"
theme = "paperesque"
[pagination]
  pagerSize = 5

[params]
  author = "Anand"
  description = "Personal blog — thoughts, experiences, and more."
  defaultTheme = "auto"          # auto | light | dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hey, I'm Anand 👋"
    Content = "Welcome to my personal corner of the internet. I write about things I find interesting — occasionally."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourusername"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
